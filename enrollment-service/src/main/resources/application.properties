spring.application.name=enrollment-service
server.port=8083

spring.datasource.url=${ENROLLMENT_DB_URL:jdbc:mysql://localhost:3306/enrollment_db}
spring.datasource.username=${ENROLLMENT_DB_USERNAME:enrollment_user}
spring.datasource.password=${ENROLLMENT_DB_PASSWORD:enrollment_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.initialization-fail-timeout=${ENROLLMENT_DB_INIT_FAIL_TIMEOUT:0}

spring.jpa.hibernate.ddl-auto=${ENROLLMENT_JPA_DDL_AUTO:none}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.open-in-view=false
spring.sql.init.mode=never
