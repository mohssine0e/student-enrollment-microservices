spring.application.name=course-service
server.port=8082

spring.datasource.url=${COURSE_DB_URL:jdbc:mysql://localhost:3306/course_db}
spring.datasource.username=${COURSE_DB_USERNAME:course_user}
spring.datasource.password=${COURSE_DB_PASSWORD:course_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.initialization-fail-timeout=${COURSE_DB_INIT_FAIL_TIMEOUT:0}

spring.jpa.hibernate.ddl-auto=${COURSE_JPA_DDL_AUTO:none}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.open-in-view=false
spring.sql.init.mode=never
