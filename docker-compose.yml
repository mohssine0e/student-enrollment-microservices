# Docker Compose local development file.
# Service containers use build-context placeholders until Dockerfiles are added.
# Do not store production credentials in this file.

name: student-enrollment-system

services:
  student-db:
    image: ${STUDENT_DB_IMAGE:-mysql:8.4}
    container_name: student-db
    environment:
      MYSQL_DATABASE: ${STUDENT_DB_NAME:-student_db}
      MYSQL_USER: ${STUDENT_DB_USERNAME:-student_user}
      MYSQL_PASSWORD: ${STUDENT_DB_PASSWORD:-student_password}
      MYSQL_ROOT_PASSWORD: ${STUDENT_DB_ROOT_PASSWORD:-root_password}
    ports:
      - "${STUDENT_DB_PORT:-3307}:3306"
    volumes:
      - student-db-data:/var/lib/mysql
    networks:
      - enrollment-network

  course-db:
    image: ${COURSE_DB_IMAGE:-mysql:8.4}
    container_name: course-db
    environment:
      MYSQL_DATABASE: ${COURSE_DB_NAME:-course_db}
      MYSQL_USER: ${COURSE_DB_USERNAME:-course_user}
      MYSQL_PASSWORD: ${COURSE_DB_PASSWORD:-course_password}
      MYSQL_ROOT_PASSWORD: ${COURSE_DB_ROOT_PASSWORD:-root_password}
    ports:
      - "${COURSE_DB_PORT:-3308}:3306"
    volumes:
      - course-db-data:/var/lib/mysql
    networks:
      - enrollment-network

  enrollment-db:
    image: ${ENROLLMENT_DB_IMAGE:-mysql:8.4}
    container_name: enrollment-db
    environment:
      MYSQL_DATABASE: ${ENROLLMENT_DB_NAME:-enrollment_db}
      MYSQL_USER: ${ENROLLMENT_DB_USERNAME:-enrollment_user}
      MYSQL_PASSWORD: ${ENROLLMENT_DB_PASSWORD:-enrollment_password}
      MYSQL_ROOT_PASSWORD: ${ENROLLMENT_DB_ROOT_PASSWORD:-root_password}
    ports:
      - "${ENROLLMENT_DB_PORT:-3309}:3306"
    volumes:
      - enrollment-db-data:/var/lib/mysql
    networks:
      - enrollment-network

  student-service:
    build:
      context: ./student-service
    container_name: student-service
    depends_on:
      - student-db
    environment:
      STUDENT_DB_URL: ${STUDENT_DB_URL:-jdbc:mysql://student-db:3306/student_db}
      STUDENT_DB_USERNAME: ${STUDENT_DB_USERNAME:-student_user}
      STUDENT_DB_PASSWORD: ${STUDENT_DB_PASSWORD:-student_password}
      STUDENT_JPA_DDL_AUTO: ${STUDENT_JPA_DDL_AUTO:-update}
    ports:
      - "${STUDENT_SERVICE_PORT:-8081}:8081"
    networks:
      - enrollment-network

  course-service:
    build:
      context: ./course-service
    container_name: course-service
    depends_on:
      - course-db
    environment:
      COURSE_DB_URL: ${COURSE_DB_URL:-jdbc:mysql://course-db:3306/course_db}
      COURSE_DB_USERNAME: ${COURSE_DB_USERNAME:-course_user}
      COURSE_DB_PASSWORD: ${COURSE_DB_PASSWORD:-course_password}
      COURSE_JPA_DDL_AUTO: ${COURSE_JPA_DDL_AUTO:-update}
    ports:
      - "${COURSE_SERVICE_PORT:-8082}:8082"
    networks:
      - enrollment-network

  enrollment-service:
    build:
      context: ./enrollment-service
    container_name: enrollment-service
    depends_on:
      - enrollment-db
      - student-service
      - course-service
    environment:
      ENROLLMENT_DB_URL: ${ENROLLMENT_DB_URL:-jdbc:mysql://enrollment-db:3306/enrollment_db}
      ENROLLMENT_DB_USERNAME: ${ENROLLMENT_DB_USERNAME:-enrollment_user}
      ENROLLMENT_DB_PASSWORD: ${ENROLLMENT_DB_PASSWORD:-enrollment_password}
      ENROLLMENT_JPA_DDL_AUTO: ${ENROLLMENT_JPA_DDL_AUTO:-update}
      STUDENT_SERVICE_BASE_URL: ${STUDENT_SERVICE_BASE_URL:-http://student-service:8081}
      COURSE_SERVICE_BASE_URL: ${COURSE_SERVICE_BASE_URL:-http://course-service:8082}
    ports:
      - "${ENROLLMENT_SERVICE_PORT:-8083}:8083"
    networks:
      - enrollment-network

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    depends_on:
      - student-service
      - course-service
      - enrollment-service
    environment:
      STUDENT_SERVICE_URL: ${STUDENT_SERVICE_URL:-http://student-service:8081}
      COURSE_SERVICE_URL: ${COURSE_SERVICE_URL:-http://course-service:8082}
      ENROLLMENT_SERVICE_URL: ${ENROLLMENT_SERVICE_URL:-http://enrollment-service:8083}
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    networks:
      - enrollment-network

networks:
  enrollment-network:
    driver: bridge

volumes:
  student-db-data:
  course-db-data:
  enrollment-db-data:
