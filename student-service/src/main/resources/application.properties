spring.application.name=student-service
server.port=8081

spring.datasource.url=${STUDENT_DB_URL:jdbc:mysql://localhost:3306/student_db}
spring.datasource.username=${STUDENT_DB_USERNAME:student_user}
spring.datasource.password=${STUDENT_DB_PASSWORD:student_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.initialization-fail-timeout=${STUDENT_DB_INIT_FAIL_TIMEOUT:0}

spring.jpa.hibernate.ddl-auto=${STUDENT_JPA_DDL_AUTO:none}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.open-in-view=false
spring.sql.init.mode=never
